[Custom]
# ============================================
# 分流模板：去广告 + 智能分流（只有一个 Proxy 组）
# 国内 & 可直连的海外服务 → 直连
# 广告 → 拒绝
# 其余国外流量 → 走节点
# ============================================

[Rule Provider]
# 广告域名（每天更新）
reject:
  type: http
  behavior: domain
  url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
  path: ./ruleset/reject.yaml
  interval: 86400

# 直连域名（包含国内 + 苹果/微软/甲骨文等可直连海外服务，每天更新）
direct:
  type: http
  behavior: domain
  url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
  path: ./ruleset/direct.yaml
  interval: 86400

# 代理域名（需要科学的国外服务，每天更新）
proxy:
  type: http
  behavior: domain
  url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
  path: ./ruleset/proxy.yaml
  interval: 86400

[Proxy Group]
# 唯一的代理组，自动包含订阅里所有节点
Proxy = select,.*

[Rule]
# ① 广告：最高优先级，直接拒绝
RULE-SET,reject,REJECT

# ② 直连列表：国内 + 苹果/微软/甲骨文等可直连海外
RULE-SET,direct,DIRECT

# ③ 你的额外直连补充（需要时删掉注释，改一下域名就行）
# DOMAIN-SUFFIX,example.com,DIRECT

# ④ 国内 IP 直连
GEOIP,CN,DIRECT

# ⑤ 代理列表：明确需要代理的国外域名
RULE-SET,proxy,Proxy

# ⑥ 兜底：上面都没匹配的全都走代理
MATCH,Proxy
